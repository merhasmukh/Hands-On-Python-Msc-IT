# ========================================================
# nginx.conf (Example Reverse Proxy Configuration)
# ========================================================
# Typically placed in /etc/nginx/sites-available/my_app
# ========================================================

server {
    # Listen on standard HTTP port
    listen 80;
    server_name my-fastapi-app.com www.my-fastapi-app.com;

    # This routes all traffic to the Gunicorn/Uvicorn backend running locally
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nginx is much faster at serving static files than Python, 
    # so we tell Nginx to serve the /static/ directory directly!
    location /static/ {
        alias /var/www/my_app/static/;
    }
}
