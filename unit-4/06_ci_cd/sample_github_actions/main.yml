name: Python CI Pipeline

# 1. Trigger the workflow on pushes or pull requests to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. Define the jobs
jobs:
  test:
    # Use a Linux environment
    runs-on: ubuntu-latest

    steps:
    # 3. Check out the code from the repository
    - name: Check out repository code
      uses: actions/checkout@v3

    # 4. Install Python
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # 5. Install the project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 6. Run a linter (Flake8) to check for syntax errors
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 7. Run the unit tests using Pytest
    - name: Test with pytest
      run: |
        pytest
